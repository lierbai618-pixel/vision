# 智能视觉系统 - Docker Compose配置

version: "3.8"

services:
  # Streamlit Web界面（集成所有功能）
  web:
    build: .
    container_name: vision-web
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
      - ./recordings:/app/recordings
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

  # Nginx反向代理（可选，生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: vision-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: unless-stopped
